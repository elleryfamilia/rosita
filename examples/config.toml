# .rosita/config.toml — repo-level rosita configuration. PUBLIC / shareable:
# safe to commit. Keep sensitive specifics (real hostnames, host_classes globs,
# capability params values) in the gitignored .rosita/local.toml instead.
# Layer order (later wins): built-in ← global config.toml ← global local.toml ←
# repo config.toml ← repo local.toml.

[defaults]
# Agent used when `rosita render` / `rosita run` omit --agent.
agent = "claude"

[env]
# ONLY these env var NAMES are ever surfaced (values are redacted as a backstop).
allowlist = ["LANG", "LC_ALL", "TERM", "TZ", "EDITOR", "CI"]
# Names matching these regexes are dropped even if allowlisted above.
deny_name_patterns = ["(?i)(secret|token|key|password|credential|auth)"]

[codex]
# Opt-in to writing AGENTS.override.md. AGENTS.md itself is never overwritten.
write_override = false
# Warn when generated output exceeds this many KiB.
max_output_kib = 32

# `host_classes` (hostname globs → class) and capability `params` values are
# private — define them in .rosita/local.toml, not here. You can still *match*
# on `host_class` in profile rules below; only the definitions are private.

# Capabilities are reusable guidance atoms that profiles compose. Built-ins are
# always present (e.g. baseline, rust-conventions, infra-caution, terse-comms,
# conventional-commits); override one by id, or add your own. Fields:
#   id (required); description, tags, risk (info|caution|dangerous),
#   when (self-gate rules), requires (other capability ids), params (table),
#   agents (restrict to specific agent ids), guidance (templated markdown).
# Guidance is a minijinja template with { context, profile, capability, params,
# agent } in scope.
[[capabilities]]
id = "house-style"
description = "House style"
tags = ["dev-workflow"]
guidance = "Run the formatter and the linter before every commit."

# Profiles override the built-ins by name; add your own freely.
# A profile matches when ALL `when` clauses match (AND). Selection is ADDITIVE:
# every matching profile contributes; their capabilities are unioned (deduped,
# priority-ordered), `requires` resolved, per-capability `when` filtered, and
# `exclude` applied. Set `exclusive = true` to replace rather than add.
# Fields: stack | language | package_manager | path | branch | repo | host_class | os | arch
# Ops:    equals | starts_with | contains | matches
[[profiles]]
name = "experimental"
priority = 40
when = [{ field = "branch", op = "starts_with", value = "experiment/" }]
# Compose reusable capabilities (preferred over inline guidance)…
capabilities = ["experimental-iteration", "house-style"]

[[profiles]]
name = "infra"
priority = 50
when = [{ field = "path", op = "starts_with", value = "infra/" }]
# …or keep inline `guidance` (back-compat); it renders as a `<profile>:inline`
# capability after the explicit ones.
guidance = "Infrastructure code — prefer plans over direct mutation; never touch shared/remote state without explicit confirmation."

# Agents are built in (claude, codex, gemini, opencode, copilot, generic).
# Override one by id, or add your own — no code change needed. Fields:
#   id, generated_filename (required); display_name, template, launch,
#   importer (auto-wire @import into a LOCAL file), override_target/override_base
#   (opt-in merge), wire_hint, append_prompt_flag.
# rosita auto-wires only agents with a LOCAL importer; everything else is
# emit-only (a gitignored overlay + a hint), so committed AGENTS.md/GEMINI.md
# are never touched by default.
#
# [[agents]]
# id = "myagent"
# generated_filename = "myagent.md"
# launch = "myagent"
# wire_hint = "include .rosita/generated/myagent.md from your agent's config"
