# ~/.config/rosita/config.toml — your GLOBAL rosita configuration.
#
# Capabilities and profiles are global-only: authored once here and shared
# across every repo. A repo never defines them — it only inherits whichever
# profile matches its detected stack. This file is PUBLIC / shareable; keep
# sensitive specifics (real hostnames, host_classes globs, capability `params`
# values) in the gitignored ~/.config/rosita/local.toml instead.
#
# Layer order (later wins): built-in ← global config.toml ← global local.toml.
# (Repo layers contribute only a private [binding] and param overrides — never
# capabilities or profiles.)

[defaults]
# Agent used when `rosita render` / `rosita run` omit --agent.
agent = "claude"

[env]
# ONLY these env var NAMES are ever surfaced (values are redacted as a backstop).
allowlist = ["LANG", "LC_ALL", "TERM", "TZ", "EDITOR", "CI"]
# Names matching these regexes are dropped even if allowlisted above.
deny_name_patterns = ["(?i)(secret|token|key|password|credential|auth|session|cookie)"]

[codex]
# Opt-in to writing AGENTS.override.md. AGENTS.md itself is never overwritten.
write_override = false
# Warn when generated output exceeds this many KiB.
max_output_kib = 32

# Capabilities are reusable guidance atoms that profiles compose. They are
# entirely YOURS — there are no always-on built-ins. rosita ships a read-only
# *palette* you can copy from (`rosita capabilities`, or duplicate in studio),
# but a profile only renders capabilities that physically live in your config.
# Fields:
#   id (required); description, tags, risk (info|caution|danger),
#   when (self-gate rules), requires (other capability ids), params (table),
#   agents (restrict to specific agent ids), guidance (templated markdown).
#   Dynamic: provider (built-in: host|toolchain|ai-tools|tailnet|docker),
#   command (shell), cache (TTL). Authored globally, every capability is
#   trusted — there is no per-repo `rosita allow` gate.
# Guidance is a minijinja template with { context, profile, capability, params,
# agent, provider } in scope (provider.output / provider.data for dynamic caps).
[[capabilities]]
id = "house-style"
description = "House style"
tags = ["dev-workflow"]
guidance = "Run the formatter and the linter before every commit."

[[capabilities]]
id = "rust-conventions"
description = "Rust conventions"
tags = ["stack"]
guidance = "Rust project. Build with cargo, format with rustfmt, lint with clippy (`cargo clippy --all-targets`). Prefer `?`/`Result` over `unwrap()` in non-test code."

# A capability that self-gates on a host class (defined privately in local.toml,
# so the public config never names a machine). It renders only on `work` hosts.
[[capabilities]]
id = "work-strict"
description = "Work machine posture"
risk = "caution"
when = [{ field = "host_class", op = "equals", value = "work" }]
guidance = """
Work machine. Be conservative: no force-pushes, no destructive commands without
explicit confirmation, keep secrets out of logs and commits, and prefer opening
a PR over pushing to shared branches.
"""

# Dynamic capability example: embed live machine identity (built-in provider,
# always trusted, no exec). Uncomment and reference from a profile to use.
# [[capabilities]]
# id = "machine-id"
# description = "This machine"
# provider = "host"
# cache = "60s"
# guidance = "Running on {{ provider.output }}."
#
# A `command`-backed capability runs a shell command; its (redacted) stdout is
# embedded (an empty `guidance` falls back to the raw output). Authored here in
# the global config, it is trusted.
# [[capabilities]]
# id = "kernel"
# description = "Kernel"
# command = "uname -sm"
# cache = "30s"

# A repo uses ONE profile, chosen by language/platform. Each profile is tied to
# coarse `targets` (rust | node | nextjs | go | python | android | java |
# machine). On `rosita run`/`render`: 0 targets match → no profile (empty
# overlay); exactly 1 → auto-used; 2+ → you're asked once and the choice is
# remembered per-project in the gitignored local.toml `[binding]`.
# A profile renders its `capabilities` in order (deduped, `requires`-resolved,
# per-capability `when`-filtered). It needs ≥1 capability to be useful.
[[profiles]]
name = "rust"
targets = ["rust"]
capabilities = ["rust-conventions", "house-style"]

[[profiles]]
name = "machine"
targets = ["machine"] # the "no repo" context (general devops/sysadmin work)
capabilities = ["house-style", "work-strict"]

# Agents are built in (claude, codex, gemini, opencode, copilot, generic).
# Override one by id, or add your own — no code change needed. Fields:
#   id, generated_filename (required); display_name, template, launch,
#   importer (auto-wire @import into a LOCAL file), override_target/override_base
#   (opt-in merge), wire_hint, append_prompt_flag.
# rosita auto-wires only agents with a LOCAL importer; everything else is
# emit-only (a gitignored overlay + a hint), so committed AGENTS.md/GEMINI.md
# are never touched by default.
#
# [[agents]]
# id = "myagent"
# generated_filename = "myagent.md"
# launch = "myagent"
# wire_hint = "include .rosita/generated/myagent.md from your agent's config"
