# ~/.config/rosita/config.toml — your GLOBAL rosita configuration.
#
# Fragments and profiles are global-only: authored once here and shared
# across every repo. A repo never defines them — it only inherits whichever
# profile matches its detected stack. This file is PUBLIC / shareable; keep
# sensitive specifics (real hostnames, host_classes globs, fragment `params`
# values) in the gitignored ~/.config/rosita/local.toml instead.
#
# Layer order (later wins): built-in ← global config.toml ← global local.toml.
# (Repo layers contribute only a private [binding] and param overrides — never
# fragments or profiles.)
#
# The fastest way to fill this in is `rosita studio` → "Starter packs": pick a
# pack and it stages a curated set of fragments plus a ready-made profile for
# you to review and Apply. What follows is the same idea written by hand.

[defaults]
# Agent used when `rosita render` / `rosita run` omit --agent.
agent = "claude"

[env]
# ONLY these env var NAMES are ever surfaced (values are redacted as a backstop).
allowlist = ["LANG", "LC_ALL", "TERM", "TZ", "EDITOR", "CI"]
# Names matching these regexes are dropped even if allowlisted above.
deny_name_patterns = ["(?i)(secret|token|key|password|credential|auth|session|cookie)"]

[codex]
# Write a gitignored AGENTS.override.md (which Codex reads before AGENTS.md) so
# `rosita run codex` delivers context out of the box. AGENTS.md is never touched.
# Defaults to true; set false (or pass --no-override) to opt out.
write_override = true
# Warn when generated output exceeds this many KiB.
max_output_kib = 32

# Fragments are reusable guidance atoms that profiles compose. They are
# entirely YOURS — there are no always-on built-ins. rosita ships a read-only
# *palette* you can copy from (`rosita fragments`, or duplicate in studio),
# but a profile only renders fragments that physically live in your config.
# Fields:
#   id (required); description, category,
#   when (self-gate rules), requires (other fragment ids), params (table),
#   agents (restrict to specific agent ids), guidance (templated markdown).
#   `category` groups the fragment in studio's tree. Dynamic: provider (built-in:
#   host|toolchain|ai-tools|tailnet|docker), command (shell), cache (TTL).
#   Authored globally, every fragment is trusted — no per-repo `rosita allow` gate.
# Guidance is a minijinja template with { context, profile, fragment, params,
# agent, provider } in scope (provider.output / provider.data for dynamic fragments).

# --- everyday essentials (safe, sensible defaults any profile can compose) ----
[[fragments]]
id = "terse-comms"
description = "Terse communication"
category = "Operating Style"
guidance = "Be terse: lead with the result and what changed; skip preamble. For non-trivial decisions, briefly note the reasoning, the tradeoffs, and the alternatives considered."

[[fragments]]
id = "conventional-commits"
description = "Conventional commits"
category = "Dev Workflow"
guidance = "Use Conventional Commits (`feat:`, `fix:`, `refactor:`, `docs:`, …). Imperative subject ≤72 chars; the body explains *why* when it is non-obvious."

[[fragments]]
id = "branch-discipline"
description = "Never commit to main"
category = "Safety"
guidance = "Never commit or push directly to the main/master branch — always work on a branch and open a pull request instead of pushing to shared branches."

[[fragments]]
id = "secrets-hygiene"
description = "Secrets hygiene"
category = "Security"
guidance = "Never print, log, or commit secrets, credentials, tokens, or `.env` files. Keep sensitive values out of code and out of command output."

[[fragments]]
id = "validate-before-done"
description = "Build & verify before done"
category = "Quality"
guidance = "Before declaring work done, run the build, the tests, and the linter, and report the results honestly. If something failed or was skipped, say so plainly."

# --- stack conventions --------------------------------------------------------
[[fragments]]
id = "rust-conventions"
description = "Rust conventions"
category = "Stack Conventions"
guidance = "Rust project. Build with cargo, format with rustfmt, lint with clippy (`cargo clippy --all-targets`). Prefer `?`/`Result` over `unwrap()` or `panic!` in non-test code."

# A fragment that self-gates on a host class (defined privately in local.toml,
# so the public config never names a machine). It renders only on `work` hosts.
[[fragments]]
id = "work-strict"
description = "Work machine posture"
category = "Safety"
when = [{ field = "host_class", op = "equals", value = "work" }]
guidance = """
Work machine. Be conservative: no force-pushes, no destructive commands without
explicit confirmation, keep secrets out of logs and commits, and prefer opening
a PR over pushing to shared branches.
"""

# Dynamic fragment example: embed live machine identity (built-in provider,
# always trusted, no exec). Uncomment and reference from a profile to use.
# [[fragments]]
# id = "machine-id"
# description = "This machine"
# category = "Local Environment"
# provider = "host"
# cache = "60s"
# guidance = "Running on {{ provider.output }}."
#
# A `command`-backed fragment runs a shell command; its (redacted) stdout is
# embedded (an empty `guidance` falls back to the raw output). Authored here in
# the global config, it is trusted.
# [[fragments]]
# id = "kernel"
# description = "Kernel"
# category = "Local Environment"
# command = "uname -sm"
# cache = "30s"

# A repo uses ONE profile, chosen by language/platform. Each profile is tied to
# coarse `targets` (rust | node | nextjs | go | python | android | java |
# machine). On `rosita run`/`render`: 0 targets match → no profile (empty
# overlay); exactly 1 → auto-used; 2+ → you're asked once and the choice is
# remembered per-project in the gitignored local.toml `[binding]`.
# A profile renders its `fragments` in order (deduped, `requires`-resolved,
# per-fragment `when`-filtered). Profiles are self-contained — there is no
# always-on base layered underneath — so each one composes the shared essentials
# it wants (this is exactly what a Starter pack stages for you).
[[profiles]]
name = "rust"
targets = ["rust"]
fragments = [
  "rust-conventions",
  "terse-comms",
  "conventional-commits",
  "branch-discipline",
  "secrets-hygiene",
  "validate-before-done",
]

[[profiles]]
name = "machine"
targets = ["machine"] # the "no repo" context (general devops/sysadmin work)
fragments = [
  "terse-comms",
  "conventional-commits",
  "secrets-hygiene",
  "validate-before-done",
  "work-strict",
]

# Agents are built in (claude, codex, gemini, opencode, copilot, generic).
# Override one by id, or add your own — no code change needed. Fields:
#   id, generated_filename (required); display_name, template, launch,
#   importer (auto-wire @import into a LOCAL file), override_target/override_base
#   (opt-in merge), wire_hint, append_prompt_flag.
# rosita auto-wires only agents with a LOCAL importer; everything else is
# emit-only (a gitignored overlay + a hint), so committed AGENTS.md/GEMINI.md
# are never touched by default.
#
# [[agents]]
# id = "myagent"
# generated_filename = "myagent.md"
# launch = "myagent"
# wire_hint = "include .rosita/generated/myagent.md from your agent's config"
