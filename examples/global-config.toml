# ~/.config/rosita/config.toml — global rosita configuration.
#
# Applies to every repo, then each repo's .rosita/config.toml layers on top
# (repo wins). Good place for machine-wide defaults: env allowlist, host
# classes, and org-wide profiles. Install with `rosita init --global`.

[defaults]
agent = "claude"

[env]
# Conservative machine-wide allowlist (repos can widen/replace this).
allowlist = ["LANG", "LC_ALL", "TERM", "TZ", "EDITOR", "CI"]
deny_name_patterns = ["(?i)(secret|token|key|password|credential|auth|session|cookie)"]

[codex]
write_override = false
max_output_kib = 32

# Classify your hosts once, globally; match `host_class` in a capability's
# `when` rules (profile selection itself is by language/platform `targets`).
[host_classes]
work = ["*.corp.example.com", "*.internal", "work-laptop"]
personal = ["*.lan", "home-*"]

# A reusable capability that self-gates on the work host class. Add it to any
# profile's `capabilities` to apply it (it renders only on `work` hosts).
[[capabilities]]
id = "work-strict"
description = "Work machine posture"
risk = "caution"
when = [{ field = "host_class", op = "equals", value = "work" }]
guidance = """
Work machine. Be conservative: no force-pushes, no destructive commands without
explicit confirmation, keep secrets out of logs and commits, and prefer opening
a PR over pushing to shared branches.
"""

# An org-wide profile for the bare machine (no repo). Compose your reusable
# capabilities here; selection ties it to the `machine` context.
[[profiles]]
name = "machine"
targets = ["machine"]
capabilities = ["work-strict"]
