<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 268" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="rosita pipeline: detect context, match coarse targets, select one profile, compose its capabilities, render and deliver the overlay">
  <style>
    .bg{fill:#ffffff}
    .card{fill:#f6f8fa;stroke:#d0d7de;stroke-width:1.5}
    .card-accent{fill:#ddf4ff;stroke:#54aeff;stroke-width:1.5}
    .strip{fill:#f6f8fa;stroke:#d0d7de;stroke-width:1}
    .t{fill:#1f2328}
    .t-muted{fill:#656d76}
    .t-accent{fill:#0969da}
    .s-line{stroke:#8c959f;stroke-width:1.5;fill:none}
    .arrow{fill:#8c959f}
    @media (prefers-color-scheme: dark){
      .bg{fill:#0d1117}
      .card{fill:#161b22;stroke:#30363d}
      .card-accent{fill:#121d2f;stroke:#1f6feb}
      .strip{fill:#161b22;stroke:#30363d}
      .t{fill:#e6edf3}
      .t-muted{fill:#8b949e}
      .t-accent{fill:#58a6ff}
      .s-line{stroke:#6e7681}
      .arrow{fill:#6e7681}
    }
    .title{font-size:19px;font-weight:700}
    .sub{font-size:12.5px}
    .step{font-size:14.5px;font-weight:700}
    .cap{font-size:11px}
    .rule{font-size:12.5px}
    .rule-b{font-size:12.5px;font-weight:700}
  </style>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" class="arrow"/>
  </marker>

  <rect class="bg" x="0" y="0" width="960" height="268"/>

  <text class="title t" x="480" y="34" text-anchor="middle">How rosita builds your agent overlay</text>
  <text class="sub t-muted" x="480" y="56" text-anchor="middle">one profile per context — detected for this repo, never merged across profiles</text>

  <!-- boxes -->
  <rect class="card"        x="20"  y="84" width="160" height="62" rx="10"/>
  <rect class="card"        x="210" y="84" width="160" height="62" rx="10"/>
  <rect class="card-accent" x="400" y="84" width="160" height="62" rx="10"/>
  <rect class="card"        x="590" y="84" width="160" height="62" rx="10"/>
  <rect class="card"        x="780" y="84" width="160" height="62" rx="10"/>

  <text class="step t"        x="100" y="120" text-anchor="middle">Detect</text>
  <text class="step t"        x="290" y="120" text-anchor="middle">Targets</text>
  <text class="step t-accent" x="480" y="120" text-anchor="middle">Select ONE</text>
  <text class="step t"        x="670" y="120" text-anchor="middle">Compose</text>
  <text class="step t"        x="860" y="120" text-anchor="middle">Render</text>

  <!-- connectors -->
  <line x1="182" y1="115" x2="206" y2="115" class="s-line" marker-end="url(#ah)"/>
  <line x1="372" y1="115" x2="396" y2="115" class="s-line" marker-end="url(#ah)"/>
  <line x1="562" y1="115" x2="586" y2="115" class="s-line" marker-end="url(#ah)"/>
  <line x1="752" y1="115" x2="776" y2="115" class="s-line" marker-end="url(#ah)"/>

  <!-- captions under each box -->
  <text class="cap t-muted" x="100" y="166" text-anchor="middle">cwd · git · stack · host</text>
  <text class="cap t-muted" x="290" y="166" text-anchor="middle">rust · node · go · machine…</text>
  <text class="cap t-muted" x="480" y="166" text-anchor="middle">a profile that targets this</text>
  <text class="cap t-muted" x="670" y="166" text-anchor="middle">its capabilities, in order</text>
  <text class="cap t-muted" x="860" y="166" text-anchor="middle">→ deliver to each agent</text>

  <!-- selection-rule strip -->
  <rect class="strip" x="20" y="196" width="920" height="48" rx="10"/>
  <text x="40" y="216" class="rule-b t-accent">Selecting the one profile</text>
  <text x="40" y="234" class="rule t-muted">
    <tspan class="rule-b t">0</tspan> match → empty overlay
    &#160;&#160;·&#160;&#160; <tspan class="rule-b t">1</tspan> → auto-used
    &#160;&#160;·&#160;&#160; <tspan class="rule-b t">2+</tspan> → you pick once; the choice is remembered per project (the binding)
  </text>
</svg>
