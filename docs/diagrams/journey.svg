<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="How you use rosita. Step 1, rosita studio: author once — create capabilities and reusable profiles. Step 2, rosita run claude: rosita detects your stack, selects the right profile, and injects the global context into the agent. The inject step works per agent through each one's native gitignored hook.">
  <style>
    .bg{fill:#ffffff}
    .card{fill:#f6f8fa;stroke:#d0d7de;stroke-width:1.5}
    .card-accent{fill:#ddf4ff;stroke:#54aeff;stroke-width:1.75}
    .panel{fill:#f6f8fa;stroke:#d0d7de;stroke-width:1}
    .badge{fill:#0969da}
    .badge-num{fill:#ffffff}
    .t{fill:#1f2328}
    .t-muted{fill:#656d76}
    .t-accent{fill:#0969da}
    .s-line{stroke:#8c959f;stroke-width:1.75;fill:none}
    .arrow{fill:#8c959f}
    @media (prefers-color-scheme: dark){
      .bg{fill:#0d1117}
      .card{fill:#161b22;stroke:#30363d}
      .card-accent{fill:#121d2f;stroke:#1f6feb}
      .panel{fill:#161b22;stroke:#30363d}
      .badge{fill:#1f6feb}
      .badge-num{fill:#ffffff}
      .t{fill:#e6edf3}
      .t-muted{fill:#8b949e}
      .t-accent{fill:#58a6ff}
      .s-line{stroke:#6e7681}
      .arrow{fill:#6e7681}
    }
    .title{font-size:21px;font-weight:700}
    .sub{font-size:13.5px}
    .cmd{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:14.5px;font-weight:700}
    .num{font-size:14px;font-weight:700}
    .h{font-size:15.5px;font-weight:700}
    .node{font-size:14.5px;font-weight:600}
    .small{font-size:12px}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;font-weight:700}
    .legh{font-size:12px;font-weight:700}
  </style>
  <marker id="ahj" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M0 0 L10 5 L0 10 z" class="arrow"/>
  </marker>

  <rect class="bg" x="0" y="0" width="960" height="470"/>

  <text class="title t" x="480" y="38" text-anchor="middle">How you use rosita</text>
  <text class="sub t-muted" x="480" y="63" text-anchor="middle">author your context once — then run, and rosita injects the right slice into whichever agent you launch</text>

  <!-- Step 1: author -->
  <circle class="badge" cx="42" cy="104" r="14"/>
  <text class="num badge-num" x="42" y="109" text-anchor="middle">1</text>
  <text class="cmd t-accent" x="66" y="109">$ rosita studio</text>
  <rect class="card" x="24" y="124" width="912" height="66" rx="12"/>
  <text class="h t" x="48" y="155">Author once — create capabilities and reusable profiles</text>
  <text class="small t-muted" x="48" y="176">your global library: reusable units of guidance, composed into profiles you own</text>

  <!-- Step 2: use -->
  <circle class="badge" cx="42" cy="232" r="14"/>
  <text class="num badge-num" x="42" y="237" text-anchor="middle">2</text>
  <text class="cmd t-accent" x="66" y="237">$ rosita run claude</text>

  <rect class="card"        x="24"  y="252" width="290" height="66" rx="12"/>
  <rect class="card-accent" x="335" y="252" width="290" height="66" rx="12"/>
  <rect class="card"        x="646" y="252" width="290" height="66" rx="12"/>

  <text class="node t"        x="169" y="286" text-anchor="middle">detect your stack</text>
  <text class="small t-muted" x="169" y="306" text-anchor="middle">rust · node · go · python…</text>
  <text class="node t-accent" x="480" y="286" text-anchor="middle">select the right profile</text>
  <text class="small t-muted" x="480" y="306" text-anchor="middle">the one whose targets match</text>
  <text class="node t"        x="791" y="286" text-anchor="middle">inject* into the agent</text>
  <text class="small t-muted" x="791" y="306" text-anchor="middle">…then launch it</text>

  <line x1="316" y1="285" x2="333" y2="285" class="s-line" marker-end="url(#ahj)"/>
  <line x1="627" y1="285" x2="644" y2="285" class="s-line" marker-end="url(#ahj)"/>

  <!-- Legend: how inject works per agent -->
  <rect class="panel" x="24" y="346" width="912" height="104" rx="12"/>
  <text class="legh t-accent" x="46" y="373">* inject — each agent gets the overlay through its own native, gitignored hook (never your committed files):</text>

  <text x="46"  y="400"><tspan class="mono t-accent">claude</tspan><tspan class="small t-muted">  →  @import in CLAUDE.local.md</tspan></text>
  <text x="498" y="400"><tspan class="mono t-accent">codex</tspan><tspan class="small t-muted">  →  gitignored AGENTS.override.md</tspan></text>
  <text x="46"  y="422"><tspan class="mono t-accent">gemini</tspan><tspan class="small t-muted">  →  GEMINI.local.md + ~/.gemini settings</tspan></text>
  <text x="498" y="422"><tspan class="mono t-accent">opencode</tspan><tspan class="small t-muted">  →  overlay path in opencode.json</tspan></text>
  <text x="46"  y="444"><tspan class="mono t-accent">copilot</tspan><tspan class="small t-muted">  →  COPILOT_CUSTOM_INSTRUCTIONS_DIRS</tspan></text>
  <text x="498" y="444"><tspan class="mono t-accent">generic</tspan><tspan class="small t-muted">  →  emit-only; you wire it in</tspan></text>
</svg>
